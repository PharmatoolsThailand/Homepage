<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการหลังบ้าน | Pharmatools Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Assets/CSS/style.css">
    <style type="text/tailwindcss">
        @layer components {
            .admin-card { @apply bg-white p-6 rounded-2xl shadow-sm border border-slate-200; }
            .input-field { @apply w-full px-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-teal-500 bg-slate-50 text-slate-700; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 flex items-center justify-center min-h-screen p-4" id="app-body">

    <div id="login-section" class="w-full max-w-md admin-card transform transition-all">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-teal-100 text-teal-600 rounded-full flex items-center justify-center text-3xl mx-auto mb-4">
                <i class="fa-solid fa-user-shield"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">เข้าสู่ระบบหลังบ้าน</h1>
            <p class="text-slate-500 text-sm mt-2">สำหรับผู้ดูแลระบบ Pharmatools เท่านั้น</p>
        </div>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">ชื่อผู้ใช้ (Username)</label>
                <input type="text" id="username" class="input-field" placeholder="กรอกชื่อผู้ใช้..." required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">รหัสผ่าน (Password)</label>
                <input type="password" id="password" class="input-field" placeholder="กรอกรหัสผ่าน..." required>
            </div>
            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3.5 rounded-xl shadow-md transition mt-4">
                เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <div id="dashboard-section" class="w-full max-w-5xl hidden flex-col h-[90vh]">

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-6 flex justify-between items-center shrink-0">
            <h2 class="text-xl font-bold text-teal-800"><i class="fa-solid fa-laptop-medical mr-2"></i> Pharmatools Admin Panel</h2>
            <button onclick="logout()" class="text-rose-500 hover:text-rose-700 font-semibold px-4 py-2 rounded-lg hover:bg-rose-50 transition">
                <i class="fa-solid fa-right-from-bracket mr-1"></i> ออกจากระบบ
            </button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 flex-grow overflow-hidden">

            <div class="admin-card lg:col-span-1 overflow-y-auto hide-scrollbar">
                <h3 class="text-lg font-bold text-slate-800 mb-4 border-l-4 border-teal-500 pl-3">เพิ่มเครื่องมือใหม่</h3>
                <form id="tool-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">หมวดหมู่</label>
                        <select id="tool-category" class="input-field">
                            <option value="clinical">งานคลินิก (บุคลากร)</option>
                            <option value="patient">สำหรับผู้ป่วย</option>
                            <option value="dev">กำลังพัฒนา (Coming Soon)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">ชื่อเครื่องมือ</label>
                        <input type="text" id="tool-title" class="input-field" placeholder="เช่น Warfarin Calculator" required>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">รายละเอียดแบบย่อ</label>
                        <textarea id="tool-desc" class="input-field resize-none" rows="3" placeholder="อธิบายประโยชน์ของเครื่องมือ..." required></textarea>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">ไอคอน (ชื่อคลาส FontAwesome)</label>
                        <input type="text" id="tool-icon" class="input-field" placeholder="เช่น fa-heart-pulse" required>
                    </div>
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 rounded-xl shadow-md transition">
                        <i class="fa-solid fa-plus mr-2"></i> บันทึกข้อมูล
                    </button>
                </form>
            </div>

            <div class="admin-card lg:col-span-2 overflow-y-auto hide-scrollbar flex flex-col">
                <h3 class="text-lg font-bold text-slate-800 mb-4 border-l-4 border-blue-500 pl-3">รายการเครื่องมือปัจจุบัน</h3>
                <div class="bg-slate-50 rounded-xl p-4 border border-slate-200 flex-grow flex items-center justify-center text-slate-400 text-center">
                    <div>
                        <i class="fa-solid fa-database text-4xl mb-3"></i>
                        <p>ตารางข้อมูลจะแสดงที่นี่<br><span class="text-sm">(ในอนาคตจะดึงข้อมูลมาจาก Google Firebase)</span></p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const loginForm = document.getElementById('login-form');
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const body = document.getElementById('app-body');

        // จำลองการตรวจสอบรหัสผ่าน
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // รหัสผ่านทดสอบ (คุณสามารถลองพิมพ์ admin / 1234 เพื่อดูหน้าตาได้)
            if(user === 'admin' && pass === '1234') {
                // สลับหน้าจอ
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                dashboardSection.classList.add('flex');
                body.classList.remove('items-center'); // ให้ dashboard ชิดบน
                body.classList.add('items-start', 'pt-8');
            } else {
                alert('ชื่อผู้ใช้ หรือ รหัสผ่านไม่ถูกต้องครับ');
            }
        });

        // จำลองการกดออกจากระบบ
        function logout() {
            loginSection.classList.remove('hidden');
            dashboardSection.classList.add('hidden');
            dashboardSection.classList.remove('flex');
            body.classList.add('items-center');
            body.classList.remove('items-start', 'pt-8');
            loginForm.reset();
        }

        // จำลองเวลากดเพิ่มข้อมูล
        document.getElementById('tool-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('สมมติว่าข้อมูลถูกบันทึกลงฐานข้อมูล Firebase เรียบร้อยแล้ว! (ในเวอร์ชันจริงข้อมูลจะไปโผล่ที่หน้า Index ทันที)');
            e.target.reset();
        });
    </script>
</body>
</html>
