<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmatools Portal</title>
    <link rel="stylesheet" href="Assets/CSS/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Pharmatools">
    <link rel="apple-touch-icon" href="Assets/Images/icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="top-nav">
        <div class="nav-content">
            <span class="nav-brand">✨ Pharmatools by เภสัชกรเอ็นดู</span>
            <button id="back-to-home" class="btn-home" style="display: none;">🏠 กลับหน้าหลัก</button>
        </div>
    </nav>

    <div id="home-section" class="portal-container">
        <div class="portal-header">
            <h1>ระบบเครื่องมือทางคลินิก</h1>
            <p>เลือกแอปพลิเคชันที่คุณต้องการเข้าใช้งาน</p>
        </div>

        <main class="app-grid">
            <div class="app-card" onclick="openWebApp('https://pharmatoolsthailand.github.io/CalcCarb/Index.html')" style="--theme-color: #3498db;">
                <div class="card-icon-wrapper"><span class="card-icon">🍚</span></div>
                <h3 class="card-title">CalcCarb</h3>
                <span class="card-subtitle">คำนวณคาร์โบไฮเดรต</span>
            </div>

            <div class="app-card" onclick="openWebApp('https://pharmatoolsthailand.github.io/ADR_Timeline/Index.html')" style="--theme-color: #e74c3c;">
                <div class="card-icon-wrapper"><span class="card-icon">⏱️</span></div>
                <h3 class="card-title">ADR Timeline</h3>
                <span class="card-subtitle">ประเมินระยะเวลาแพ้ยา</span>
            </div>

            <div class="app-card" onclick="openWebApp('https://pharmatoolsthailand.github.io/WarfarinDoseCalculator/Index.html')" style="--theme-color: #9b59b6;">
                <div class="card-icon-wrapper"><span class="card-icon">🩸</span></div>
                <h3 class="card-title">Warfarin Dose</h3>
                <span class="card-subtitle">คำนวณขนาดยาวาร์ฟาริน</span>
            </div>
        </main>
    </div>

    <div id="viewer-section" class="viewer-container" style="display: none;">
        <div class="loader-container" id="iframe-loader">
            <div class="spinner"></div>
            <p>กำลังโหลดระบบ...</p>
        </div>
        <iframe id="web-viewer" src="" frameborder="0" onload="document.getElementById('iframe-loader').style.display='none'"></iframe>
    </div>

    <script src="Assets/JS/script.js"></script>
</body>
</html>
